# PostgreSQL Development Configuration
# File: postgres/postgresql.dev.conf
# Optimized for: Development with 4-8GB RAM, SSD, Mixed workload
# Last updated: 2025-01-04

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

max_connections = 200                    # Up from default 100
# Enough for medium-sized apps with connection pooling

#------------------------------------------------------------------------------
# RESOURCE USAGE (Memory)
#------------------------------------------------------------------------------

shared_buffers = 2GB                     # Up from default 128MB
# 25% of RAM (for 8GB system) - primary cache
# Adjust: 2GB RAM = 512MB, 4GB = 1GB, 16GB = 4GB

effective_cache_size = 6GB               # Up from default 4GB
# 75% of RAM - helps query planner estimate
# Adjust: 2GB RAM = 1.5GB, 4GB = 3GB, 16GB = 12GB

work_mem = 32MB                          # Up from default 4MB
# Per-operation memory (sort, hash join)
# Total max: 200 connections × 32MB = 6.4GB (careful!)

maintenance_work_mem = 512MB             # Up from default 64MB
# For VACUUM, CREATE INDEX, bulk loads

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL)
#------------------------------------------------------------------------------

wal_buffers = 16MB                       # Up from default -1 (auto)
# WAL buffer size

max_wal_size = 4GB                       # Up from default 1GB
# Maximum WAL size before checkpoint

min_wal_size = 1GB                       # Up from default 80MB
# Minimum WAL kept for recycling

checkpoint_completion_target = 0.9       # Default 0.9 (good)
# Spread checkpoint I/O over 90% of interval

#------------------------------------------------------------------------------
# QUERY TUNING (SSD Optimized)
#------------------------------------------------------------------------------

random_page_cost = 1.1                   # Down from default 4.0
# Lower for SSD (most dev machines)
# HDD use 4.0, SSD use 1.0-1.5

effective_io_concurrency = 200           # Up from default 1
# For SSD - concurrent I/O operations

default_statistics_target = 100          # Default 100 (good)
# Affects ANALYZE statistics detail

#------------------------------------------------------------------------------
# PARALLEL QUERY
#------------------------------------------------------------------------------

max_worker_processes = 8                 # Default 8
max_parallel_workers_per_gather = 4      # Up from default 2
max_parallel_workers = 8                 # Default 8
max_parallel_maintenance_workers = 4     # Up from default 2

#------------------------------------------------------------------------------
# LOGGING (Development - Verbose)
#------------------------------------------------------------------------------

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# Log slow queries
log_min_duration_statement = 1000        # Log queries > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off                    # Set 'on' for debugging
log_disconnections = off
log_lock_waits = on                      # Log slow locks
log_temp_files = 0                       # Log all temp files

# Statement logging (useful for development)
log_statement = 'none'                   # 'none', 'ddl', 'mod', 'all'
# Set to 'all' for full query logging (warning: very verbose!)

#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------

shared_preload_libraries = 'pg_stat_statements'
# Enables query performance tracking

track_activities = on
track_counts = on
track_io_timing = on                     # Useful for performance tuning
track_functions = all                    # Track function execution

#------------------------------------------------------------------------------
# AUTOVACUUM (Keep database healthy)
#------------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 4               # Up from default 3
autovacuum_naptime = 1min                # Default 1min

# Aggressive autovacuum for development (prevents bloat)
autovacuum_vacuum_scale_factor = 0.1     # Down from 0.2
autovacuum_analyze_scale_factor = 0.05   # Down from 0.1

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

deadlock_timeout = 1s                    # Default 1s
max_locks_per_transaction = 64           # Default 64

#------------------------------------------------------------------------------
# ERROR REPORTING
#------------------------------------------------------------------------------

client_min_messages = notice             # notice, warning, error
log_min_messages = warning               # More verbose than client
log_min_error_statement = error

#------------------------------------------------------------------------------
# NOTES & TUNING GUIDE
#------------------------------------------------------------------------------

# This config is optimized for:
# ✅ Development environment
# ✅ 8GB RAM (adjust shared_buffers & effective_cache_size)
# ✅ SSD storage
# ✅ Mixed read/write workload
# ✅ Up to 200 concurrent connections

# RAM-based adjustments:
# 2GB RAM:  shared_buffers = 512MB,  effective_cache_size = 1.5GB
# 4GB RAM:  shared_buffers = 1GB,    effective_cache_size = 3GB
# 8GB RAM:  shared_buffers = 2GB,    effective_cache_size = 6GB
# 16GB RAM: shared_buffers = 4GB,    effective_cache_size = 12GB
# 32GB RAM: shared_buffers = 8GB,    effective_cache_size = 24GB

# Storage-based adjustments:
# HDD: random_page_cost = 4.0, effective_io_concurrency = 2
# SSD: random_page_cost = 1.1, effective_io_concurrency = 200
# NVMe: random_page_cost = 1.0, effective_io_concurrency = 300
