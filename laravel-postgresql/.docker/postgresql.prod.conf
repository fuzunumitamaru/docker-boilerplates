# PostgreSQL Production Configuration
# File: postgres/postgresql.prod.conf
# Optimized for: Production with 8-16GB RAM, SSD, High availability
# Last updated: 2025-01-04

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

max_connections = 500                    # Up from default 100
# For production with connection pooling (PgBouncer recommended)

# Connection security
ssl = on                                 # Require SSL (configure certs separately)
password_encryption = scram-sha-256      # Strong password hashing

#------------------------------------------------------------------------------
# RESOURCE USAGE (Memory)
#------------------------------------------------------------------------------

shared_buffers = 4GB                     # 25% of 16GB RAM
# Adjust: 8GB RAM = 2GB, 16GB = 4GB, 32GB = 8GB

effective_cache_size = 12GB              # 75% of 16GB RAM
# Adjust: 8GB RAM = 6GB, 16GB = 12GB, 32GB = 24GB

work_mem = 16MB                          # Conservative for 500 connections
# Max total: 500 × 16MB = 8GB (safe)

maintenance_work_mem = 1GB               # For VACUUM, reindex
# Higher for production maintenance

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL) - Production Tuning
#------------------------------------------------------------------------------

wal_level = replica                      # Enable replication
# Options: minimal, replica, logical

wal_buffers = 16MB
max_wal_size = 8GB                       # Double dev settings
min_wal_size = 2GB

checkpoint_completion_target = 0.9
checkpoint_timeout = 15min               # Up from default 5min
# Fewer checkpoints = better write performance

# WAL archiving (for point-in-time recovery)
archive_mode = on                        # Enable WAL archiving
archive_command = '/bin/true'            # Replace with actual archive command
# Example: 'cp %p /mnt/backup/wal/%f'

#------------------------------------------------------------------------------
# REPLICATION (Master/Standby Setup)
#------------------------------------------------------------------------------

max_wal_senders = 10                     # Allow 10 standby servers
wal_keep_size = 1GB                      # Keep 1GB of WAL for replication
hot_standby = on                         # Allow reads on standby

#------------------------------------------------------------------------------
# QUERY TUNING (Production Optimized)
#------------------------------------------------------------------------------

random_page_cost = 1.1                   # For SSD
effective_io_concurrency = 200           # For SSD

default_statistics_target = 100

#------------------------------------------------------------------------------
# PARALLEL QUERY (Production Tuning)
#------------------------------------------------------------------------------

max_worker_processes = 16                # More workers for production
max_parallel_workers_per_gather = 4
max_parallel_workers = 16                # Match worker_processes
max_parallel_maintenance_workers = 4

#------------------------------------------------------------------------------
# LOGGING (Production - Selective)
#------------------------------------------------------------------------------

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 1GB                  # Larger rotation size

# Log important events only
log_min_duration_statement = 500         # Log queries > 500ms
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off                    # Too noisy in production
log_disconnections = off
log_lock_waits = on                      # Log deadlocks
log_temp_files = 0

# Error logging
log_min_error_statement = error          # Log errors
log_statement = 'ddl'                    # Log DDL only (schema changes)

# Auto-explain slow queries
shared_preload_libraries = 'pg_stat_statements,auto_explain'
auto_explain.log_min_duration = 1000     # Explain queries > 1s
auto_explain.log_analyze = true
auto_explain.log_buffers = true

#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------

track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# Statement statistics
pg_stat_statements.track = all
pg_stat_statements.max = 10000

#------------------------------------------------------------------------------
# AUTOVACUUM (Aggressive for Production)
#------------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 6               # More workers
autovacuum_naptime = 30s                 # More frequent

# Aggressive vacuuming prevents bloat
autovacuum_vacuum_scale_factor = 0.05    # Vacuum at 5% dead tuples
autovacuum_analyze_scale_factor = 0.025  # Analyze at 2.5% changes

# Vacuum cost delay (prevent I/O spikes)
autovacuum_vacuum_cost_delay = 10ms      # Throttle vacuum
autovacuum_vacuum_cost_limit = 1000      # I/O budget

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

default_text_search_config = 'pg_catalog.english'

# Statement timeout (prevent runaway queries)
statement_timeout = 60000                # 60 seconds (60000ms)
idle_in_transaction_session_timeout = 300000  # 5 minutes

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

deadlock_timeout = 1s
max_locks_per_transaction = 64

#------------------------------------------------------------------------------
# ERROR REPORTING (Production)
#------------------------------------------------------------------------------

client_min_messages = warning            # Don't spam clients
log_min_messages = warning
log_min_error_statement = error

#------------------------------------------------------------------------------
# BGWRITER (Background Writer Tuning)
#------------------------------------------------------------------------------

bgwriter_delay = 200ms                   # Default 200ms
bgwriter_lru_maxpages = 100              # Default 100
bgwriter_lru_multiplier = 2.0            # Default 2.0

#------------------------------------------------------------------------------
# SECURITY
#------------------------------------------------------------------------------

# Enable these and configure properly:
# ssl = on
# ssl_cert_file = '/path/to/server.crt'
# ssl_key_file = '/path/to/server.key'
# ssl_ca_file = '/path/to/root.crt'

# Row Level Security
row_security = on

#------------------------------------------------------------------------------
# MONITORING & EXTENSIONS
#------------------------------------------------------------------------------

# Recommended production extensions to enable:
# CREATE EXTENSION pg_stat_statements;
# CREATE EXTENSION pg_trgm;  -- For text search
# CREATE EXTENSION pgcrypto;  -- For encryption
# CREATE EXTENSION uuid-ossp;  -- For UUIDs

#------------------------------------------------------------------------------
# NOTES & PRODUCTION CHECKLIST
#------------------------------------------------------------------------------

# This config is optimized for:
# ✅ Production environment
# ✅ 16GB RAM (adjust shared_buffers & effective_cache_size)
# ✅ SSD storage
# ✅ High availability (replication ready)
# ✅ Up to 500 concurrent connections (use PgBouncer!)

# RAM-based adjustments:
# 8GB RAM:  shared_buffers = 2GB,  effective_cache_size = 6GB
# 16GB RAM: shared_buffers = 4GB,  effective_cache_size = 12GB
# 32GB RAM: shared_buffers = 8GB,  effective_cache_size = 24GB
# 64GB RAM: shared_buffers = 16GB, effective_cache_size = 48GB

# PRODUCTION CHECKLIST:
# [ ] Set up SSL certificates
# [ ] Configure archive_command for backups
# [ ] Set up replication (if needed)
# [ ] Install PgBouncer for connection pooling
# [ ] Set up monitoring (pg_stat_statements, log analysis)
# [ ] Configure regular backups (pg_dump, pg_basebackup)
# [ ] Tune autovacuum based on actual workload
# [ ] Set up WAL archiving for PITR
# [ ] Configure firewall rules
# [ ] Set up log rotation
# [ ] Monitor disk space (WAL, logs, data)
