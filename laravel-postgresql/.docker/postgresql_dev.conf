# PostgreSQL Development Configuration
# File: .docker/postgresql_dev.conf
# Optimized for: Development with 4-8GB RAM, SSD, Mixed workload
# Last updated: 2025-01-04

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

max_connections = 100                    # Default - sufficient for local dev

#------------------------------------------------------------------------------
# RESOURCE USAGE (Memory)
#------------------------------------------------------------------------------

shared_buffers = 512MB                   # Reduced for dev (was 2GB - too heavy)
# 25% of RAM rule applies to dedicated DB servers, not dev containers
# Adjust if needed: 2GB RAM = 256MB, 4GB = 512MB, 8GB = 1GB

effective_cache_size = 1536MB            # ~3x shared_buffers for dev
# Helps query planner estimate available cache
# Adjust: 2GB RAM = 768MB, 4GB = 1.5GB, 8GB = 3GB

work_mem = 16MB                          # Per-operation memory (sort, hash join)
# Total max: 100 connections × 16MB = 1.6GB (safe for dev)

maintenance_work_mem = 128MB             # For VACUUM, CREATE INDEX, bulk loads

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL)
#------------------------------------------------------------------------------

wal_buffers = 16MB                       # Up from default -1 (auto)

max_wal_size = 1GB                       # Default - sufficient for dev
min_wal_size = 80MB                      # Default

checkpoint_completion_target = 0.9       # Spread checkpoint I/O over 90% of interval

#------------------------------------------------------------------------------
# QUERY TUNING (SSD Optimized)
#------------------------------------------------------------------------------

random_page_cost = 1.1                   # For SSD (default 4.0 is for HDD)
# HDD: 4.0 | SSD: 1.0-1.5 | NVMe: 1.0

effective_io_concurrency = 200           # For SSD concurrent I/O
# HDD: 2 | SSD: 200 | NVMe: 300

default_statistics_target = 100          # Default (good for dev)

#------------------------------------------------------------------------------
# PARALLEL QUERY
#------------------------------------------------------------------------------

max_worker_processes = 8                 # Default 8
max_parallel_workers_per_gather = 2      # Default - sufficient for dev
max_parallel_workers = 8                 # Default 8
max_parallel_maintenance_workers = 2     # Default

#------------------------------------------------------------------------------
# LOGGING (Development - Verbose)
#------------------------------------------------------------------------------

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# Log slow queries
log_min_duration_statement = 1000        # Log queries > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off                    # Set 'on' for debugging
log_disconnections = off
log_lock_waits = on                      # Log slow locks
log_temp_files = 0                       # Log all temp files

# Statement logging (useful for development)
log_statement = 'none'                   # 'none', 'ddl', 'mod', 'all'
# Set to 'all' for full query logging (warning: very verbose!)

#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------

shared_preload_libraries = 'pg_stat_statements'

track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

#------------------------------------------------------------------------------
# AUTOVACUUM (Keep database healthy)
#------------------------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 3               # Default - sufficient for dev
autovacuum_naptime = 1min

autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

deadlock_timeout = 1s
max_locks_per_transaction = 64

#------------------------------------------------------------------------------
# ERROR REPORTING
#------------------------------------------------------------------------------

client_min_messages = notice
log_min_messages = warning
log_min_error_statement = error

#------------------------------------------------------------------------------
# NOTES & TUNING GUIDE
#------------------------------------------------------------------------------

# This config is optimized for:
# ✅ Development environment (Docker container)
# ✅ 4-8GB RAM total machine (shared with other containers)
# ✅ SSD storage
# ✅ Mixed read/write workload
# ✅ Up to 100 concurrent connections

# RAM-based adjustments (shared_buffers / effective_cache_size):
# 2GB RAM:  256MB  / 768MB
# 4GB RAM:  512MB  / 1.5GB
# 8GB RAM:  1GB    / 3GB
# 16GB RAM: 2GB    / 6GB  ← use prod config instead

# Storage-based adjustments:
# HDD:  random_page_cost = 4.0, effective_io_concurrency = 2
# SSD:  random_page_cost = 1.1, effective_io_concurrency = 200
# NVMe: random_page_cost = 1.0, effective_io_concurrency = 300
